server {
    server_name p2ptax.smartlaunchhub.com;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API backend
    location /api/ {
        proxy_pass http://localhost:3812/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Stage = no caching of API responses (so devtools always shows fresh data).
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    # MinIO object proxy (avatars, attachments) — keep public-cacheable since
    # avatars change rarely; backend updates avatarUrl when they do.
    location /p2ptax/ {
        proxy_pass http://localhost:3812/p2ptax/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # ── Legacy static prototype routes (kept for backward-compat, no-cache) ──
    location ~ ^/(catalog|specialist|chat)(/.*)?$ {
        root /var/www/p2ptax/landing;
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location = /styles.css      { root /var/www/p2ptax/landing; add_header Cache-Control "no-store" always; }
    location = /components.jsx  { root /var/www/p2ptax/landing; add_header Cache-Control "no-store" always; }
    location = /overlays.jsx    { root /var/www/p2ptax/landing; add_header Cache-Control "no-store" always; }
    location = /data.js         { root /var/www/p2ptax/landing; add_header Cache-Control "no-store" always; }
    location = /api.js          { root /var/www/p2ptax/landing; add_header Cache-Control "no-store" always; }
    location /screenshots/ {
        root /var/www/p2ptax/landing;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # ── Expo app (the actual development build) ─────────────────────────────
    # /_expo/ holds hashed bundles (content-addressed). Hash changes on deploy,
    # so users always get fresh code via a new index.html. Safe to cache 1 year.
    location /_expo/ {
        root /var/www/p2ptax/dist;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        access_log off;
    }

    # version.json must always be fresh — clients use it to detect new builds.
    location = /version.json {
        root /var/www/p2ptax/dist;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Expo app catch-all (incl. root `/` → expo landing at app/index.tsx).
    # ZERO caching of HTML during staging so any push to development is
    # reflected on next page load. Hashed bundles under /_expo/ stay cached.
    location / {
        root /var/www/p2ptax/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/p2ptax.smartlaunchhub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/p2ptax.smartlaunchhub.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = p2ptax.smartlaunchhub.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name p2ptax.smartlaunchhub.com;
    return 404;
}
