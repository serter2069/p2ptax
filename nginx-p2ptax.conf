server {
    server_name p2ptax.smartlaunchhub.com;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API backend
    location /api/ {
        proxy_pass http://localhost:3812/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Landing prototype homepage at root
    location = / {
        root /var/www/p2ptax/landing;
        try_files /index.html =404;
    }

    # Landing prototype SPA routes — serve landing/index.html for client-side routing
    location = /catalog {
        root /var/www/p2ptax/landing;
        try_files /index.html =404;
    }
    location ~ ^/specialist(/.*)?$ {
        root /var/www/p2ptax/landing;
        try_files /index.html =404;
    }
    location ~ ^/chat(/.*)?$ {
        root /var/www/p2ptax/landing;
        try_files /index.html =404;
    }

    # Landing prototype static assets (served directly from landing/)
    location = /styles.css      { root /var/www/p2ptax/landing; }
    location = /components.jsx  { root /var/www/p2ptax/landing; }
    location = /overlays.jsx    { root /var/www/p2ptax/landing; }
    location = /data.js         { root /var/www/p2ptax/landing; }
    location = /api.js          { root /var/www/p2ptax/landing; }
    location /screenshots/ {
        root /var/www/p2ptax/landing;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Expo static assets with caching
    location /_expo/ {
        root /var/www/p2ptax/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Expo app — all other routes (requests/new, specialists, messages, etc.)
    location / {
        root /var/www/p2ptax/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/p2ptax.smartlaunchhub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/p2ptax.smartlaunchhub.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = p2ptax.smartlaunchhub.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name p2ptax.smartlaunchhub.com;
    return 404;
}
