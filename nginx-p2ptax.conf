map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    server_name p2ptax.smartlaunchhub.com;

    client_max_body_size 100M;

    location /api/ {
        proxy_pass http://localhost:3812/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location /p2ptax/ {
        proxy_pass http://localhost:3812/p2ptax/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location /__snap/ {
        alias /var/www/p2ptax-snapshots/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    # Wave 5 / specialist-split: /specialist is a real route in the SPA
    # (specialist editor) and is NOT served by the static landing. Only
    # /catalog and /chat remain owned by the marketing landing.
    location ~ ^/(catalog|chat)(/.*)?$ {
        root /var/www/p2ptax/landing;
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location = /styles.css      { root /var/www/p2ptax/landing; add_header Cache-Control "no-store" always; }
    location = /components.jsx  { root /var/www/p2ptax/landing; add_header Cache-Control "no-store" always; }
    location = /overlays.jsx    { root /var/www/p2ptax/landing; add_header Cache-Control "no-store" always; }
    location = /data.js         { root /var/www/p2ptax/landing; add_header Cache-Control "no-store" always; }
    location = /api.js          { root /var/www/p2ptax/landing; add_header Cache-Control "no-store" always; }
    location /screenshots/ {
        root /var/www/p2ptax/landing;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    # Everything else → Metro dev server (HMR via WebSocket).
    location / {
        proxy_pass http://localhost:19006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/p2ptax.smartlaunchhub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/p2ptax.smartlaunchhub.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = p2ptax.smartlaunchhub.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name p2ptax.smartlaunchhub.com;
    return 404;
}
