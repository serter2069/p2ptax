<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Налоговик — Brand Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Lora:wght@400;500;600;700&family=Work+Sans:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #E8E6E3;
  font-family: Inter, sans-serif;
  padding: 32px 24px;
  min-height: 100vh;
}
h1 {
  text-align: center;
  font-size: 28px;
  font-weight: 700;
  color: #1A1918;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.subtitle {
  text-align: center;
  font-size: 14px;
  color: #6B6560;
  margin-bottom: 32px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  max-width: 1280px;
  margin: 0 auto;
}
.variant {
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.10), 0 1px 3px rgba(0,0,0,0.06);
  background: var(--bg);
  font-family: var(--font), Inter, sans-serif;
}
.v-header {
  background: var(--bg);
  padding: 16px 20px 14px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.v-num {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  font-family: Inter, sans-serif;
  letter-spacing: 0.5px;
}
.v-name {
  font-size: 17px;
  font-weight: 700;
  color: var(--primary);
  margin-top: 2px;
  letter-spacing: -0.3px;
  font-family: var(--font), Inter, sans-serif;
}
.v-domain {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}
.v-font-label {
  text-align: right;
  font-size: 10px;
  color: var(--muted);
  font-family: Inter, sans-serif;
  line-height: 1.5;
}
.v-font-label strong {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--primary);
  font-family: var(--font), Inter, sans-serif;
}
.v-swatches {
  display: flex;
  gap: 10px;
  padding: 14px 20px;
  background: var(--bg);
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.swatch-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.swatch-circle {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,0.10);
  flex-shrink: 0;
}
.swatch-hex {
  font-size: 9px;
  color: var(--muted);
  font-family: 'Courier New', monospace;
  letter-spacing: -0.3px;
}
.swatch-label {
  font-size: 9px;
  color: var(--muted);
  font-family: Inter, sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.v-hero {
  position: relative;
  height: 190px;
  overflow: hidden;
}
.v-hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.v-hero-overlay {
  position: absolute;
  inset: 0;
}
.v-hero-content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 16px 18px;
}
.v-hero-tag {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 3px;
  margin-bottom: 6px;
  font-family: Inter, sans-serif;
}
.v-hero-title {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
  letter-spacing: -0.3px;
  font-family: var(--font), Inter, sans-serif;
  margin-bottom: 10px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.v-hero-btns {
  display: flex;
  gap: 8px;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font), Inter, sans-serif;
}
.btn-secondary {
  background: rgba(255,255,255,0.18);
  color: #fff;
  border: 1.5px solid rgba(255,255,255,0.50);
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font), Inter, sans-serif;
  backdrop-filter: blur(4px);
}
.v-bottom {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  background: var(--bg);
}
.v-card {
  padding: 14px 16px;
  border-top: 1px solid rgba(0,0,0,0.06);
  border-right: 1px solid rgba(0,0,0,0.06);
}
.v-card-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--accent);
  font-family: Inter, sans-serif;
  margin-bottom: 6px;
}
.v-card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 4px;
  font-family: var(--font), Inter, sans-serif;
}
.v-card-text {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.5;
}
.v-badge {
  display: inline-block;
  margin-top: 8px;
  border: 1.5px solid var(--accent);
  color: var(--accent);
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
  font-family: Inter, sans-serif;
  letter-spacing: 0.3px;
}
.v-typo {
  padding: 14px 16px;
  border-top: 1px solid rgba(0,0,0,0.06);
}
.v-typo-heading {
  font-size: 15px;
  font-weight: 700;
  color: var(--primary);
  font-family: var(--font), Inter, sans-serif;
  margin-bottom: 4px;
  line-height: 1.3;
}
.v-typo-body {
  font-size: 12px;
  color: #111111;
  line-height: 1.55;
  margin-bottom: 6px;
}
.v-typo-mood {
  font-size: 10px;
  color: var(--accent);
  font-style: italic;
  font-family: var(--font), Inter, sans-serif;
}
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<h1>Налоговик — Brand Preview</h1>
<p class="subtitle">p2ptax.ru · 10 color variants · 2025 trends</p>

<div class="grid" id="grid"></div>

<script>
const IMAGE = 'https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=900&q=75&fit=crop';

const variants = [
  {
    num: '01', name: 'Fintech Clean', mood: 'Digital trust',
    bg: '#F8FAFB', primary: '#0F2B47', accent: '#3B82F6',
    muted: '#7A90A8', overlayRgb: '15,43,71',
    font: 'Inter',
    headline: 'Найдите налогового эксперта',
    tag: 'Налоговый маркетплейс',
    card: { label: 'Топ специалист', title: 'Иван Петров', text: 'Налоговый консультант · Москва' },
    badge: 'Verified'
  },
  {
    num: '02', name: 'Legal Cream', mood: 'Traditional authority',
    bg: '#FAF8F3', primary: '#1A180E', accent: '#C8952A',
    muted: '#8A8070', overlayRgb: '26,24,14',
    font: 'Source Sans 3',
    headline: 'Ваш налоговый советник',
    tag: 'Налоговый маркетплейс',
    card: { label: 'Специалист', title: 'Анна Смирнова', text: 'Юрист · Санкт-Петербург' },
    badge: 'Лицензия'
  },
  {
    num: '03', name: 'Sage Relief', mood: 'Calming, resolved',
    bg: '#F5FAF7', primary: '#1A2E20', accent: '#3D8B5A',
    muted: '#6A8A70', overlayRgb: '26,46,32',
    font: 'Nunito Sans',
    headline: 'Решите налоговый вопрос',
    tag: 'Налоговый маркетплейс',
    card: { label: 'Онлайн', title: 'Михаил Козлов', text: 'Бухгалтер-аудитор · Казань' },
    badge: 'Онлайн-консультация'
  },
  {
    num: '04', name: 'Stone Pro', mood: 'Quiet professional',
    bg: '#F7F6F4', primary: '#2A2520', accent: '#7A6040',
    muted: '#8A7A68', overlayRgb: '42,37,32',
    font: 'Manrope',
    headline: 'Профессиональная налоговая помощь',
    tag: 'Налоговый маркетплейс',
    card: { label: 'Опытный', title: 'Сергей Новиков', text: '15 лет стажа · Екатеринбург' },
    badge: 'Эксперт'
  },
  {
    num: '05', name: 'Navy Amber', mood: 'Classic authority',
    bg: '#F5F7FA', primary: '#162040', accent: '#E8A820',
    muted: '#7A8AA0', overlayRgb: '22,32,64',
    font: 'Plus Jakarta Sans',
    headline: 'Налоги под контролем',
    tag: 'Налоговый маркетплейс',
    card: { label: 'Рейтинг', title: 'Ольга Федорова', text: 'Налоговый юрист · Новосибирск' },
    badge: '★ 4.9'
  },
  {
    num: '06', name: 'Warm Expert', mood: 'Personal advisor',
    bg: '#FAF7F3', primary: '#3A2010', accent: '#C87040',
    muted: '#9A7860', overlayRgb: '58,32,16',
    font: 'Lora',
    headline: 'Личный налоговый советник',
    tag: 'Налоговый маркетплейс',
    card: { label: 'Индивидуально', title: 'Дмитрий Волков', text: 'Личные консультации · Краснодар' },
    badge: 'Личный подход'
  },
  {
    num: '07', name: 'Clean Teal', mood: 'Modern solutions',
    bg: '#F3FAFA', primary: '#0F3030', accent: '#1A9688',
    muted: '#5A8A88', overlayRgb: '15,48,48',
    font: 'Work Sans',
    headline: 'Современные налоговые решения',
    tag: 'Налоговый маркетплейс',
    card: { label: 'Быстро', title: 'Елена Морозова', text: 'Налоговый консультант · Самара' },
    badge: 'Ответ за 2 часа'
  },
  {
    num: '08', name: 'Dust Rose', mood: 'Approachable, kind',
    bg: '#FAF5F5', primary: '#2A1818', accent: '#A84858',
    muted: '#9A7880', overlayRgb: '42,24,24',
    font: 'Poppins',
    headline: 'Налоги — это просто',
    tag: 'Налоговый маркетплейс',
    card: { label: 'Дружелюбно', title: 'Татьяна Белова', text: 'Налоговый консультант · Уфа' },
    badge: 'Первая консультация бесплатно'
  },
  {
    num: '09', name: 'Forest', mood: 'Growth, relief',
    bg: '#F4FAF5', primary: '#1A3520', accent: '#4A8A40',
    muted: '#6A8A68', overlayRgb: '26,53,32',
    font: 'DM Sans',
    headline: 'Расти без налоговых рисков',
    tag: 'Налоговый маркетплейс',
    card: { label: 'Для бизнеса', title: 'Андрей Соколов', text: 'Бухгалтер ИП/ООО · Воронеж' },
    badge: 'Бизнес-план'
  },
  {
    num: '10', name: 'Ink', mood: 'Ultra minimal, modern',
    bg: '#F9F9F7', primary: '#111111', accent: '#555555',
    muted: '#888888', overlayRgb: '17,17,17',
    font: 'Inter',
    headline: 'Налоговый маркетплейс',
    tag: 'Налоговый маркетплейс',
    card: { label: 'Специалист', title: 'Кирилл Зайцев', text: 'Налоговый консультант · Москва' },
    badge: 'Проверен'
  }
];

const grid = document.getElementById('grid');

variants.forEach(v => {
  const el = document.createElement('div');
  el.className = 'variant';
  el.style.cssText = `--bg:${v.bg};--primary:${v.primary};--accent:${v.accent};--muted:${v.muted};--font:'${v.font}';`;

  const swatches = [
    { color: v.primary, label: 'primary' },
    { color: v.accent, label: 'accent' },
    { color: v.bg, label: 'bg' },
    { color: '#FFFFFF', label: 'surface' },
    { color: '#111111', label: 'text' },
  ];

  el.innerHTML = `
    <div class="v-header">
      <div>
        <div class="v-num">${v.num}</div>
        <div class="v-name">${v.name}</div>
        <div class="v-domain">p2ptax.ru</div>
      </div>
      <div class="v-font-label">
        <strong>${v.font}</strong>
        <span>Typography</span>
      </div>
    </div>
    <div class="v-swatches">
      ${swatches.map(s => `
        <div class="swatch-item">
          <div class="swatch-circle" style="background:${s.color}"></div>
          <div class="swatch-hex">${s.color}</div>
          <div class="swatch-label">${s.label}</div>
        </div>
      `).join('')}
    </div>
    <div class="v-hero">
      <img src="${IMAGE}" alt="Office" loading="lazy">
      <div class="v-hero-overlay" style="background:linear-gradient(to top, rgba(${v.overlayRgb},0.82) 0%, rgba(${v.overlayRgb},0.20) 70%)"></div>
      <div class="v-hero-content">
        <div class="v-hero-tag">${v.tag}</div>
        <div class="v-hero-title">${v.headline}</div>
        <div class="v-hero-btns">
          <button class="btn-primary">Найти специалиста</button>
          <button class="btn-secondary">Узнать больше</button>
        </div>
      </div>
    </div>
    <div class="v-bottom">
      <div class="v-card">
        <div class="v-card-label">${v.card.label}</div>
        <div class="v-card-title">${v.card.title}</div>
        <div class="v-card-text">${v.card.text}</div>
        <div class="v-badge">${v.badge}</div>
      </div>
      <div class="v-typo">
        <div class="v-typo-heading">Налоговые услуги</div>
        <div class="v-typo-body">Найдите проверенного налогового консультанта в вашем городе. Онлайн и офлайн.</div>
        <div class="v-typo-mood">*mood: ${v.mood}*</div>
      </div>
    </div>
  `;

  grid.appendChild(el);
});
</script>
</body>
</html>
