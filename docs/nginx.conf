# Nginx configuration for P2PTax staging/production
# Location: /etc/nginx/sites-available/p2ptax

server {
    listen 80;
    server_name p2ptax.smartlaunchhub.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name p2ptax.smartlaunchhub.com;

    ssl_certificate /etc/letsencrypt/live/p2ptax.smartlaunchhub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/p2ptax.smartlaunchhub.com/privkey.pem;

    # Frontend (Expo web export)
    root /var/www/p2ptax/web;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3812/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket support (Socket.IO)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3812/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # version.json endpoint
    location /version.json {
        try_files /version.json =404;
        add_header Cache-Control "no-cache";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
