name: Deploy P2PTax Staging

on:
  push:
    branches: [development]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install API dependencies
        working-directory: ./api
        run: npm ci

      - name: Generate Prisma client
        working-directory: ./api
        run: npx prisma generate

      - name: Build API (type check)
        working-directory: ./api
        run: npm run build

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (web)
        run: npx expo export --platform web

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1

  deploy:
    needs: [validate, build]
    if: github.event_name == 'push'
    runs-on: self-hosted
    env:
      DEPLOY_DIR: /var/www/p2ptax
    steps:
      - name: Save previous commit for rollback
        run: |
          cd $DEPLOY_DIR
          git rev-parse HEAD > /tmp/p2ptax-prev-commit

      - name: Pull latest code
        run: |
          cd $DEPLOY_DIR
          git fetch origin development
          git reset --hard origin/development

      - name: Download prebuilt web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: ${{ env.DEPLOY_DIR }}/dist/
      - name: Install frontend runtime deps
        run: |
          cd $DEPLOY_DIR
          npm ci --prefer-offline --no-audit --no-fund

      - name: Install and build API
        run: |
          cd $DEPLOY_DIR/api
          npm ci
          npx prisma generate
          npm run build

      - name: Prisma migrate status (inspect only)
        working-directory: ${{ env.DEPLOY_DIR }}/api
        run: |
          # Informational only. `prisma migrate status` exits non-zero whenever
          # local and DB states diverge (pending migrations included), but that
          # is precisely what the next step fixes via `migrate deploy`. Any true
          # DB-ahead-of-repo entries are legacy orphans that migrate deploy
          # happily ignores, so we do not block on them here.
          export DOPPLER_TOKEN=$(cat /etc/doppler/p2ptax-stg.token)
          doppler run --project p2ptax --config stg -- npx prisma migrate status || true

      - name: Run DB migrations
        run: |
          cd $DEPLOY_DIR/api
          export DOPPLER_TOKEN=$(cat /etc/doppler/p2ptax-stg.token)
          doppler run -- npx prisma migrate deploy

      - name: Seed demo data (idempotent)
        run: |
          cd $DEPLOY_DIR/api
          export DOPPLER_TOKEN=$(cat /etc/doppler/p2ptax-stg.token)
          doppler run -- npm run demo:seed

      - name: Write version.json
        run: |
          cd $DEPLOY_DIR
          echo "{\"version\":\"$(git rev-parse --short HEAD)\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > dist/version.json

      - name: Fix permissions
        run: |
          chown -R deployer:www-data $DEPLOY_DIR
          chmod -R u=rwX,g=rX,o= $DEPLOY_DIR
          [ -f $DEPLOY_DIR/api/start.sh ] && chmod 750 $DEPLOY_DIR/api/start.sh

      - name: Restart API
        run: |
          pm2 reload p2ptax-api
          pm2 save

      - name: Verify staging
        id: verify
        run: |
          sleep 5
          echo "=== Health ==="
          curl -sf https://p2ptax.smartlaunchhub.com/api/health
          echo ""
          echo "=== Version ==="
          curl -sf https://p2ptax.smartlaunchhub.com/version.json
          echo ""
          echo "=== Frontend ==="
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" https://p2ptax.smartlaunchhub.com/)
          echo "Frontend HTTP: $HTTP"
          [ "$HTTP" = "200" ] || exit 1

      - name: Auto-rollback on failure
        if: failure() && steps.verify.outcome == 'failure'
        run: |
          echo "!!! DEPLOY FAILED — ROLLING BACK !!!"
          PREV=$(cat /tmp/p2ptax-prev-commit)
          echo "Rolling back to $PREV"

          cd $DEPLOY_DIR
          git reset --hard $PREV

          npm ci
          npx expo export --platform web

          cd api
          npm ci
          npx prisma generate
          npm run build

          cd $DEPLOY_DIR
          echo "{\"version\":\"$(git rev-parse --short HEAD)\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"rollback\":true}" > dist/version.json

          chown -R deployer:www-data $DEPLOY_DIR
          chmod -R u=rwX,g=rX,o= $DEPLOY_DIR
          [ -f $DEPLOY_DIR/api/start.sh ] && chmod 750 $DEPLOY_DIR/api/start.sh

          pm2 reload p2ptax-api
          pm2 save

          sleep 5
          echo "=== Rollback verification ==="
          curl -sf https://p2ptax.smartlaunchhub.com/api/health && echo " OK" || echo " STILL BROKEN"
          curl -sf https://p2ptax.smartlaunchhub.com/version.json
