name: Deploy P2PTax

on:
  push:
    branches: [main, development]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend (web)
        run: npx expo export --platform web

      - name: Install API dependencies
        working-directory: ./api
        run: npm ci

      - name: Build API
        working-directory: ./api
        run: npm run build

      - name: Generate Prisma client
        working-directory: ./api
        run: npx prisma generate

      - name: Deploy to server
        run: |
          # Determine environment
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            DEPLOY_DIR="/var/www/p2ptax"
          else
            DEPLOY_DIR="/var/www/p2ptax"
          fi

          # Deploy frontend
          sudo mkdir -p $DEPLOY_DIR/web
          sudo rsync -av --delete dist/ $DEPLOY_DIR/web/

          # Deploy API
          sudo mkdir -p $DEPLOY_DIR/api
          sudo rsync -av --delete api/dist/ $DEPLOY_DIR/api/dist/
          sudo rsync -av api/node_modules/ $DEPLOY_DIR/api/node_modules/
          sudo rsync -av api/prisma/ $DEPLOY_DIR/api/prisma/
          sudo cp api/package.json $DEPLOY_DIR/api/package.json

          # Copy .env if not exists
          if [ ! -f $DEPLOY_DIR/api/.env ]; then
            echo "WARNING: No .env file found at $DEPLOY_DIR/api/.env"
          fi

          # Write version info
          echo "{\"version\":\"$(git rev-parse --short HEAD)\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" | sudo tee $DEPLOY_DIR/web/version.json

          # Restart API
          cd $DEPLOY_DIR/api
          sudo pm2 restart p2ptax-api || sudo pm2 start dist/index.js --name p2ptax-api
          sudo pm2 save
