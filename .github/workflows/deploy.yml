name: Deploy Staging
on:
  push:
    branches: [development]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: [ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/development'
    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: 95.217.84.161
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/p2ptax

            # Save any local/untracked state on the server (.env backups, start.sh, web/)
            git stash push --include-untracked --quiet --message "auto-deploy-stash-$(date -u +%Y%m%dT%H%M%SZ)" || true

            # Force-clean checkout to remote tip
            git fetch origin development
            git reset --hard origin/development

            # Frontend build
            npm ci
            npx expo export --platform web

            # Backend
            cd api
            npm ci

            # One-shot baseline _prisma_migrations (idempotent — fixes #1510).
            # `migrate resolve --applied` is a no-op when the row already exists,
            # so this stays safe on every subsequent deploy. After all 7 rows are
            # registered, the regular `migrate deploy` below runs cleanly.
            for m in \
              20250417000000_add_complaints_table \
              20250419000000_add_schema_fields \
              20250428000000_add_is_specialist \
              20260423000000_iter5_credibility_stack \
              20260424000000_unify_roles_user_and_specialist \
              20260428000000_add_saved_specialists \
              20260428120000_add_user_soft_delete; do
              echo "==> resolving $m"
              npx prisma migrate resolve --applied "$m" || echo "  (already applied or harmless skip)"
            done

            npx prisma migrate deploy || echo "WARN P3005 — DB unbaselined, migrations skipped (see issue #1510 for baseline plan)"
            npx prisma generate
            npm run build
            cd ..

            # Restart and verify
            pm2 restart ecosystem.config.js
            sleep 3
            curl -sf http://localhost:3812/api/health || { echo "Health check FAILED"; exit 1; }

            # Stamp version.json with actual deployed SHA
            echo '{"version":"'$(git rev-parse --short HEAD)'","deployed":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > dist/version.json

            # nginx
            cp nginx-p2ptax.conf /etc/nginx/sites-enabled/p2ptax.smartlaunchhub.com
            nginx -t
            systemctl reload nginx
