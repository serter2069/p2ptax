name: Deploy Staging
on:
  push:
    branches: [development]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: [ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/development'
    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: 95.217.84.161
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/p2ptax

            # Save any local/untracked state on the server (.env backups, start.sh, web/)
            git stash push --include-untracked --quiet --message "auto-deploy-stash-$(date -u +%Y%m%dT%H%M%SZ)" || true

            # Force-clean checkout to remote tip
            git fetch origin development
            git reset --hard origin/development

            # Frontend build
            npm ci
            npx expo export --platform web

            # Backend
            cd api
            npm ci

            # One-shot baseline _prisma_migrations (idempotent — fixes #1510).
            # `migrate resolve --applied` is a no-op when the row already exists,
            # so this stays safe on every subsequent deploy. After all 7 rows are
            # registered, the regular `migrate deploy` below runs cleanly.
            for m in \
              20250417000000_add_complaints_table \
              20250419000000_add_schema_fields \
              20250428000000_add_is_specialist \
              20260423000000_iter5_credibility_stack \
              20260424000000_unify_roles_user_and_specialist \
              20260428000000_add_saved_specialists \
              20260428120000_add_user_soft_delete; do
              echo "==> resolving $m"
              npx prisma migrate resolve --applied "$m" || echo "  (already applied or harmless skip)"
            done

            # Reset any half-applied migrations so `migrate deploy` retries them.
            # Our migrations are idempotent (ALTER ... IF EXISTS / CREATE INDEX
            # IF NOT EXISTS-ish), so retry is safe.
            for failed in 20260430000000_thread_optional_request; do
              echo "==> rolling back failed $failed (will retry)"
              npx prisma migrate resolve --rolled-back "$failed" 2>&1 | grep -v "is not a failed migration" || true
            done

            npx prisma migrate deploy || echo "WARN — migrations didn't fully apply; falling back to db push"

            # Fallback: force-sync schema from schema.prisma to DB.
            # Idempotent — does nothing if schema already matches.
            # --accept-data-loss is acceptable on staging (issue #1510 — DB
            # unbaselined; some tables never created via migrations).
            npx prisma db push --accept-data-loss --skip-generate || echo "WARN db push failed"

            npx prisma generate

            # Seed: base (cities/fns/services/users) → specialists → landing.
            # All idempotent (upsert/update). Shell env populated from /etc/profile
            # + ecosystem env, same as what `prisma migrate deploy` above used.
            #
            # PUBLIC_API_URL controls the avatarUrl prefix in seed-landing.ts so
            # avatars resolve through the production nginx, not localhost.
            export PUBLIC_API_URL="https://p2ptax.smartlaunchhub.com"

            npx tsx prisma/seed.ts            || echo "WARN seed.ts failed (non-fatal)"
            npx tsx prisma/seed-specialists.ts || echo "WARN seed-specialists failed (non-fatal)"
            npx tsx prisma/seed-profiles.ts   || echo "WARN seed-profiles failed (non-fatal)"
            npx tsx prisma/seed-landing.ts    || echo "WARN seed-landing failed (non-fatal)"
            npx tsx src/scripts/seed-landing-avatars.ts || echo "WARN seed-avatars failed (non-fatal)"

            npm run build
            cd ..

            # Restart and verify
            pm2 restart ecosystem.config.js
            sleep 3
            curl -sf http://localhost:3812/api/health || { echo "Health check FAILED"; exit 1; }

            # Stamp version.json with actual deployed SHA
            echo '{"version":"'$(git rev-parse --short HEAD)'","deployed":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > dist/version.json

            # nginx
            cp nginx-p2ptax.conf /etc/nginx/sites-enabled/p2ptax.smartlaunchhub.com
            nginx -t
            systemctl reload nginx
