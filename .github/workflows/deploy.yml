name: Deploy P2PTax Staging

on:
  push:
    branches: [development]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install --prefer-offline

      - name: Lint
        run: npm run lint

      - name: Build frontend (web)
        run: npx expo export --platform web

      - name: Deploy frontend
        run: |
          DEPLOY_DIR="/var/www/p2ptax"
          sudo mkdir -p $DEPLOY_DIR/web
          sudo rsync -av --delete dist/ $DEPLOY_DIR/web/
          echo "{\"version\":\"$(git rev-parse --short HEAD)\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" | sudo tee $DEPLOY_DIR/web/version.json

      - name: Verify staging
        run: |
          sleep 2
          curl -s https://p2ptax.smartlaunchhub.com/version.json
